about: AI 驱动的 jj 版本管理工具
version: 版本
commit:
  about: 检查变更并通过 LLM 自动生成提交信息
  dry_run: 预览提交信息而不实际创建
goto:
  about: 通过 LLM 查找并检出目标提交
  query: 目标提交的描述
  dry_run: 预览目标提交而不检出
pack:
  about: 通过 LLM 合并提交
  query: 要合并的提交的描述
  dry_run: 预览合并操作而不执行
config:
  about: 管理配置
  set:
    about: 设置配置值
    key: 配置键
    value: 配置值
    global: 设置全局配置
  get:
    about: 获取配置值
    key: 配置键
  list:
    about: 列出所有配置
